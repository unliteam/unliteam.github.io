<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> - Loading</title>
  <style type="text/css">
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('img/bg.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }

    #container {
      position: absolute;
      text-align: center;
      left: 50%;
      top: 45%;
      margin-left: -150px;
      margin-top: -120px;
      width: 300px;
    }

    #logoImage {
      max-width: 100%;
    }

    @-webkit-keyframes walk {
      0%   { -webkit-transform: rotate(0deg); }
      50%  { -webkit-transform: rotate(180deg); }
      100% { -webkit-transform: rotate(360deg); }
    }

    .walk {
      -webkit-animation: walk 10s infinite linear;
      text-align: center;
      background-color: #fff;
      width: 24px;
      height: 24px;
      color: #999;
      font-size: 16px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      border-radius: 3px;
      display: inline-block;
      border: 2px solid #999;
    }
  </style>
</head>
<body>
  <div id="background">
    <div id="container">
      <img id="logoImage" src="img/gmod_logo_brave.png" />
      <center>
        <br />
        <div class="walk">:v</div>
      </center>
    </div>
  </div>

<audio id="bgMusic">
</audio>

<script>
  window.onload = function() {
    const audio = document.getElementById('bgMusic');
    audio.volume = 0.05;
    audio.loop = true;
    
    const randomTrack = Math.random() < 0.5 ? 'music.ogg' : 'music2.ogg';
    
    const source = document.createElement('source');
    source.src = randomTrack;
    source.type = 'audio/ogg';
    
    audio.innerHTML = '';
    audio.appendChild(source);
    
    audio.load();
    audio.play().catch(error => {
      console.log('Ошибка воспроизведения bgMusic:', error.name);
    });
  };
</script>
</body>
</html>
