<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CS2 Loading | Sledbuild Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: 'Roboto Condensed', sans-serif;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            position: relative;
            background-color: #0a0c10;
        }

        .animated-bg {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: -1;
            background: url('img/bg.png') center/cover no-repeat;
            filter: blur(12px);
            animation: slowMove 24s infinite alternate ease-in-out;
            will-change: transform;
        }

        @keyframes slowMove {
            0% {
                transform: scale(1) translate(0, 0);
            }
            100% {
                transform: scale(1.12) translate(2%, 1%);
            }
        }

        .cs2-panel {
            width: 440px;
            height: 94vh;
            margin-right: 30px;
            background: rgba(10, 15, 20, 0.4);
            backdrop-filter: blur(18px) brightness(0.92);
            -webkit-backdrop-filter: blur(18px) brightness(0.92);
            padding: 70px 55px;
            box-sizing: border-box;
            color: white;
            position: relative;
            box-shadow: -15px 0 40px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cs2-panel::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: 1;
            border-radius: 12px;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .gmod-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0 30px 0;
        }

        .gmod-logo {
            width: 320px;
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.6));
        }

        .divider {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            margin: 10px 0 40px 0;
            border-radius: 3px;
        }

        .info-section {
            text-align: left;
        }

        .info-title {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 12px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .info-desc {
            font-size: 17px;
            line-height: 1.3;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 35px;
        }

        .settings-title {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .settings-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .settings-list li {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 5px;
            display: flex;
            align-items: flex-start;
        }

        .settings-list li::before {
            content: "•";
            margin-right: 10px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spacer {
            flex-grow: 1;
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="cs2-panel">
    <div class="content-wrapper">
        <div class="gmod-container">
            <img src="img/gmod_logo_brave.png" alt="GMod Sledbuild Logo" class="gmod-logo">
        </div>

        <hr class="divider">

        <div class="info-section">
            <div class="info-title">Bomb Scenario Mission</div>
            <div class="info-desc">
                Buy new weapons at the beginning<br>
                of each round with money earned.
            </div>

            <div class="settings-title">Settings:</div>
            <ul class="settings-list">
                <li>Friendly fire is ON</li>
                <li>Team collision is ON</li>
                <li>Armor and defuse kits are purchasable</li>
            </ul>
        </div>

        <div class="spacer"></div>
    </div>
</div>

</body>
</html>
